name: Build runsafe.no

on:
  push:
    branches:
      - master
    paths:
      - "email-templates/**"
      - "engine/**"
      - "KrameWork/**"
      - "modules/**"
      - "templates/**"
      - "www/**"
      - "Dockerfile.runsafe"
      - ".github/workflows/build-runsafe.yaml"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/runsafe/web-apex

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.runsafe
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}