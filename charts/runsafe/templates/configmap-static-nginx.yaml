apiVersion: v1
kind: ConfigMap
metadata:
  name: static-nginx
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        # Trust Traefik
        set_real_ip_from 10.42.0.0/16;
        real_ip_header X-Forwarded-For;
        real_ip_recursive on;

        root /usr/share/nginx/html;
        index index.html;

        charset utf-8;

        location / {
            try_files $uri $uri/ =404;
        }

        location ~ /\. {
            deny all;
        }
    }
